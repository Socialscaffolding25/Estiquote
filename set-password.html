<style>
body { min-height:100vh; display:flex; align-items:center; justify-content:center; padding:2rem; }
.card { background:var(--navy-2); border:1px solid var(--border); border-radius:20px; padding:40px; max-width:420px; width:100%; }
.logo { font-family:var(--serif); font-size:20px; font-weight:800; color:var(--text); margin-bottom:28px; text-align:center; }
.logo span { color:var(--teal-light); }
h1 { font-family:var(--serif); font-size:24px; font-weight:800; color:var(--text); margin-bottom:8px; text-align:center; }
.sub { font-size:14px; color:var(--text-muted); text-align:center; margin-bottom:28px; }
label { display:block; font-size:13px; font-weight:600; color:var(--text); margin-bottom:6px; }
input { width:100%; padding:12px 14px; background:rgba(255,255,255,0.04); border:1px solid var(--border); border-radius:8px; color:var(--text); font-family:var(--sans); font-size:16px; outline:none; transition:border-color 0.2s; margin-bottom:16px; }
input:focus { border-color:var(--teal); box-shadow:0 0 0 3px rgba(0,201,167,0.12); }
.msg { padding:12px 14px; border-radius:8px; font-size:13px; margin-bottom:16px; display:none; }
.msg.err { background:rgba(239,68,68,0.08); border:1px solid rgba(239,68,68,0.25); color:#ef4444; }
.msg.suc { background:rgba(0,201,167,0.08); border:1px solid rgba(0,201,167,0.25); color:var(--teal-light); }
.strength { height:4px; border-radius:2px; margin-top:-12px; margin-bottom:16px; background:rgba(255,255,255,0.06); }
.strength-bar { height:100%; border-radius:2px; width:0; transition:all 0.3s; }
</style>
</head>
<body>
<div class="card">
  <div class="logo">Esti<span>quote</span></div>
  <h1>Set your password</h1>
  <p class="sub">Choose a strong password for your Estiquote account.</p>

  <div id="err" class="msg err" role="alert" aria-live="assertive"></div>
  <div id="suc" class="msg suc" role="status" aria-live="polite"></div>

  <div id="form-wrap">
    <label for="password">New password</label>
    <input id="password" type="password" placeholder="8+ characters" autocomplete="new-password"
           aria-required="true" aria-label="New password, minimum 8 characters"
           oninput="checkStrength(this.value)">
    <div class="strength"><div class="strength-bar" id="str-bar"></div></div>

    <label for="confirm">Confirm password</label>
    <input id="confirm" type="password" placeholder="Repeat password" autocomplete="new-password"
           aria-required="true" aria-label="Confirm your new password">

    <button onclick="setPassword()" class="btn-primary" id="btn" style="width:100%;padding:14px;cursor:pointer;">
      Set password →
    </button>
  </div>
</div>

<script>
function checkStrength(val) {
  const bar = document.getElementById('str-bar');
  let score = 0;
  if (val.length >= 8) score++;
  if (/[A-Z]/.test(val)) score++;
  if (/[0-9]/.test(val)) score++;
  if (/[^A-Za-z0-9]/.test(val)) score++;
  const colors = ['#ef4444','#f59e0b','#f59e0b','#00c9a7','#00c9a7'];
  const widths = ['0%','25%','50%','75%','100%'];
  bar.style.background = colors[score];
  bar.style.width = widths[score];
}

async function setPassword() {
  const password = document.getElementById('password').value;
  const confirm  = document.getElementById('confirm').value;
  const btn = document.getElementById('btn');
  const err = document.getElementById('err');
  const suc = document.getElementById('suc');

  err.style.display = 'none';
  suc.style.display = 'none';

  if (password.length < 8) {
    err.textContent = 'Password must be at least 8 characters.';
    err.style.display = 'block'; return;
  }
  if (password !== confirm) {
    err.textContent = 'Passwords do not match.';
    err.style.display = 'block'; return;
  }

  btn.textContent = 'Setting password...';
  btn.disabled = true;

  try {
    // Handle token_hash flow (Safari-safe, as per skill)
    const params = new URLSearchParams(window.location.search);
    const tokenHash = params.get('token_hash');
    const type = params.get('type');

    let sb = null;
    let attempts = 0;
    while (!sb && attempts < 20) {
      await new Promise(r => setTimeout(r, 200));
      attempts++;
      if (typeof supabase !== 'undefined') {
        const url = atob('aHR0cHM6Ly93dnVsdHN4aXFqa2lzYmVpZGpjbC5zdXBhYmFzZS5jbw==');
        const key = atob('c2JfcHVibGlzaGFibGVfdTN2RUkxTDVPaDYtQ1BNTndSU09Fd19MRVpvSkxnVw==');
        sb = supabase.createClient(url, key);
      }
    }

    if (!sb) throw new Error('Connection error — please refresh and try again.');

    // Verify the OTP token first (token_hash approach — works on Safari)
    if (tokenHash && type) {
      const { error: verifyError } = await sb.auth.verifyOtp({ token_hash: tokenHash, type });
      if (verifyError) throw new Error('This reset link has expired. Please request a new one.');
    }

    // Now update the password
    const { error } = await sb.auth.updateUser({ password });
    if (error) throw new Error(error.message);

    suc.textContent = '✓ Password set successfully. Redirecting to your dashboard...';
    suc.style.display = 'block';
    document.getElementById('form-wrap').style.display = 'none';

    setTimeout(() => { window.location.href = 'dashboard.html'; }, 2000);

  } catch (e) {
    err.textContent = e.message || 'Something went wrong. Please try again.';
    err.style.display = 'block';
    btn.textContent = 'Set password →';
    btn.disabled = false;
  }
}
</script>

<div id="eq-cookie" style="display:none;position:fixed;bottom:0;left:0;right:0;z-index:9998;background:#111b2e;border-top:1px solid rgba(0,201,167,0.2);padding:14px 24px;display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap;">
  <p style="font-size:12px;color:#8892a4;margin:0;line-height:1.5;flex:1;min-width:200px;">We use essential cookies to keep you signed in and save your estimates. Plausible Analytics is cookieless and privacy-friendly. <a href="privacy.html" style="color:#00c9a7;">Privacy policy</a></p>
  <div style="display:flex;gap:8px;flex-shrink:0;">
    <button onclick="eqCookieDecline()" style="padding:8px 16px;border-radius:6px;background:transparent;border:1px solid rgba(255,255,255,0.12);color:#6b7a8d;font-family:inherit;font-size:12px;cursor:pointer;">Essential only</button>
    <button onclick="eqCookieAccept()" style="padding:8px 18px;border-radius:6px;background:linear-gradient(135deg,#00c9a7,#4dffd6);border:none;color:#0b1120;font-family:inherit;font-size:12px;font-weight:700;cursor:pointer;">Accept all</button>
  </div>
</div>
<script>
(function(){
  if(!localStorage.getItem("eq_cookie_consent")){
    var b=document.getElementById("eq-cookie");
    if(b) setTimeout(function(){b.style.display="flex";},1000);
  }
})();
function eqCookieAccept(){localStorage.setItem("eq_cookie_consent","all");document.getElementById("eq-cookie").style.display="none";}
function eqCookieDecline(){localStorage.setItem("eq_cookie_consent","essential");document.getElementById("eq-cookie").style.display="none";}
</script>
